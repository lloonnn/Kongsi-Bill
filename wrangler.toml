name = "kongsi-bill"
main = "worker/index.ts"
compatibility_date = "2026-06-26"

# Static assets — the Worker serves the Vite build output (single origin with
# the API). not_found_handling = "single-page-application" makes unmatched
# paths fall back to index.html so client-side React routes resolve.
[assets]
directory = "./dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "kongsi-bill"
database_id = "e984f2f1-490c-45cc-ab90-ea0ee3e94f2e"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 65, period = 60 }