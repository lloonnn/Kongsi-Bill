    <meta property="og:site_name" content="Kongsi Bill" />
    <meta property="og:title" content="Kongsi Bill — split bills by days at home" />

      property="og:description"
      content="Split shared household bills fairly — by the days each housemate was actually home, not evenly."

    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Kongsi Bill — split shared household bills by the days you were actually home."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kongsi Bill — split bills by days at home" />

      name="twitter:description"
      content="Split shared household bills fairly — by the days you were actually home."
